name: Build and Publish Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout parent repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Derive image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          BRANCH_NAME="${GITHUB_REF_NAME//\//-}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sub2api
        uses: docker/build-push-action@v6
        with:
          context: ./sub2api
          file: ./sub2api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/sub2api:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/sub2api:${{ steps.meta.outputs.branch_name }}
            ghcr.io/${{ steps.vars.outputs.owner }}/sub2api:${{ steps.meta.outputs.short_sha }}

      - name: Build and push image playground
        uses: docker/build-push-action@v6
        with:
          context: ./gpt_image_playground
          file: ./gpt_image_playground/deploy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/gpt-image-playground:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/gpt-image-playground:${{ steps.meta.outputs.branch_name }}
            ghcr.io/${{ steps.vars.outputs.owner }}/gpt-image-playground:${{ steps.meta.outputs.short_sha }}
